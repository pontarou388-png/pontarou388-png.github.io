<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>こんにちは世界！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', 'Hiragino Sans', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* 背景アニメーション用要素 */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s infinite ease-in-out;
        }

        .bubble:nth-child(1) { width: 60px; height: 60px; left: 10%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 80px; height: 80px; left: 20%; animation-delay: 1s; }
        .bubble:nth-child(3) { width: 40px; height: 40px; left: 80%; animation-delay: 2s; }
        .bubble:nth-child(4) { width: 100px; height: 100px; left: 85%; animation-delay: 0.5s; }
        .bubble:nth-child(5) { width: 50px; height: 50px; left: 50%; animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-40px) translateX(20px); }
        }

        .container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .main-text {
            font-size: 4rem;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 2px;
        }

        /* かわいい装飾 */
        .decoration {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .emoji-box {
            font-size: 3rem;
            animation: bounce 2s infinite;
        }

        .emoji-box:nth-child(1) { animation-delay: 0s; }
        .emoji-box:nth-child(2) { animation-delay: 0.2s; }
        .emoji-box:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .message {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 30px;
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .sparkle {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            position: absolute;
            animation: sparkleAnimation 1.5s infinite;
        }

        .sparkle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 30%; right: 20%; animation-delay: 0.5s; }
        .sparkle:nth-child(3) { bottom: 25%; left: 25%; animation-delay: 1s; }

        @keyframes sparkleAnimation {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .heart {
            display: inline-block;
            color: #ff6b9d;
            font-size: 1.5rem;
            margin: 0 5px;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>

    <div class="container">
        <div class="decoration">
            <span class="emoji-box">✨</span>
            <span class="emoji-box">🌸</span>
            <span class="emoji-box">✨</span>
        </div>

        <h1 class="main-text">こんにちは<span class="heart">❤</span>世界！</h1>

        <div class="message">
            <p>🎀 素敵な1日をお過ごしください 🎀</p>
        </div>
    </div>
</body>
</html>
